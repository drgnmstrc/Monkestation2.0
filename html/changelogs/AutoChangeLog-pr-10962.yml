author: "Ghommie, SmArtKar, TheColorCyan"
delete-after: True
changes:
  - refactor: "projectiles and embeds were severely refactored, report any issues"
  - rscadd: "(necromanceranne) Replaces the Particle Acceleration Rifle with the Event Horizon anti-existential beam rifle. It shoots black holes. You can make this in-game. That's right, YOU!"
  - balance: "(necromanceranne) Only one vortex anomaly can be made in a round."
  - refactor: "(Whoneedspacee) Wendigos abilities have been changed into actions that can be added to any mob."
  - rscadd: "(SmArtKar) You can now craft tether anchors, which can be secured with a wrench and attached to with right click. They won't let you drift into space and you can adjust tether length/cut it via lmb/rmb/ctrl click on the wire."
  - rscadd: "(SmArtKar) MOD tethers now remotely place and connect to tether anchors instead of throwing you at where they landed."
  - balance: "(SmArtKar) MOD tethers can now be used in gravity"